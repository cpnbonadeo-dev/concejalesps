<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red de Concejales PS · Santa Fe — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0D0509;
      --rojo:     #C41230;
      --rojo-osc: #8a0c20;
      --texto:    #ffffff;
      --texto-sec:#c0a0b0;
      --card-bg:  #1a0a10;
      --card-brd: #2a1020;
    }

    body {
      background: var(--bg);
      color: var(--texto);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Fondo decorativo */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80vw;
      height: 80vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,18,48,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -40%;
      right: -20%;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,18,48,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-brd);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .logo-wrap img {
      height: 40px;
      width: auto;
    }

    .logo-fallback {
      display: none;
      color: var(--rojo);
      font-weight: 700;
      font-size: 1.4rem;
      font-family: 'Playfair Display', serif;
    }

    .logo-texto {
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--texto-sec);
      line-height: 1.3;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--texto);
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--texto-sec);
      text-align: center;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--texto-sec);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-brd);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--texto);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--rojo);
    }

    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: rgba(192,160,176,0.4);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-osc) 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.99); }

    .error-msg {
      display: none;
      background: rgba(196,18,48,0.12);
      border: 1px solid rgba(196,18,48,0.3);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.875rem;
      color: #ff8a9a;
      margin-top: 1rem;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    .footer-login {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(192,160,176,0.5);
    }

    .footer-login a {
      color: var(--rojo);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-wrap">
      <img
        src="https://temporal.pssantafe.org/wp-content/themes/theme-template-websimple/public/images/logo-header.svg"
        alt="PS"
        onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='inline'">
      <span class="logo-fallback">PS</span>
      <span class="logo-texto">Red de Concejales<br>PS · Santa Fe</span>
    </div>

    <h1 class="login-title">Bienvenido/a</h1>
    <p class="login-subtitle">Ingresá con tus datos de acceso</p>

    <form id="loginForm" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="tu.nombre" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="clave">Contraseña</label>
        <input type="password" id="clave" name="clave" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Ingresar</button>
      <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos.</div>
    </form>

    <p class="footer-login">
      ¿Problemas para ingresar? Escribí a
      <a href="mailto:autoridadeslocales@gmail.com">autoridadeslocales@gmail.com</a>
    </p>
  </div>

  <script>
    // Si ya hay sesión activa, ir directo al sitio
    if (localStorage.getItem('concejalesps_sesion') === 'ok') {
      window.location.href = 'index.html';
    }

    const USUARIOS = {
      "admin": "pssantafe2026",
      // Agregar concejales: "nombre.apellido": "clave2026"
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const usuario = document.getElementById('usuario').value.trim().toLowerCase();
      const clave   = document.getElementById('clave').value;
      const errorEl = document.getElementById('errorMsg');

      if (USUARIOS[usuario] && USUARIOS[usuario] === clave) {
        localStorage.setItem('concejalesps_sesion', 'ok');
        localStorage.setItem('concejalesps_usuario', usuario);
        window.location.href = 'index.html';
      } else {
        errorEl.classList.add('visible');
        document.getElementById('clave').value = '';
        document.getElementById('clave').focus();
      }
    });

    // Ocultar error al escribir
    document.getElementById('usuario').addEventListener('input', () =>
      document.getElementById('errorMsg').classList.remove('visible'));
    document.getElementById('clave').addEventListener('input', () =>
      document.getElementById('errorMsg').classList.remove('visible'));
  </script>
</body>
</html>
