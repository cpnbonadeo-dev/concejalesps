<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso · Foro PS Santa Fe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#000;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;background-image:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(250,35,35,.35) 0%,transparent 65%),radial-gradient(ellipse 60% 40% at 0% 100%,rgba(196,18,48,.2) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 100% 50%,rgba(196,18,48,.15) 0%,transparent 60%)}
.bg-logo{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:0;pointer-events:none}
.bg-logo img{width:min(75vw,75vh);opacity:.18;filter:drop-shadow(0 0 80px rgba(250,35,35,.7))}
.login-box{position:relative;z-index:1;background:rgba(10,2,5,.8);border:1px solid rgba(196,18,48,.35);backdrop-filter:blur(24px)}

.login-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3rem 2.5rem;width:100%;max-width:400px;text-align:center}

.login-logo{width:64px;height:64px;margin:0 auto 1.5rem;display:block}
.login-logo-fallback{width:64px;height:64px;border-radius:50%;background:#C41230;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;font-size:1.5rem;color:white}

h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:white;margin-bottom:.4rem}
.subtitulo{font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:2rem;letter-spacing:.02em}

.campo{margin-bottom:1rem;text-align:left}
.campo label{display:block;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:.4rem;letter-spacing:.04em;text-transform:uppercase}
.campo input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:.75rem 1rem;color:white;font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s}
.campo input:focus{border-color:#C41230;background:rgba(255,255,255,.1)}
.campo input::placeholder{color:rgba(255,255,255,.25)}

.btn-login{width:100%;background:#C41230;color:white;border:none;padding:.9rem;border-radius:9px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:.5rem;letter-spacing:.02em}
.btn-login:hover{background:#E8192C}

.error{background:rgba(232,25,44,.15);border:1px solid rgba(232,25,44,.3);color:#FF8A8E;font-size:.8rem;padding:.65rem .9rem;border-radius:8px;margin-top:1rem;display:none;text-align:left}
.error.visible{display:block}

.footer-text{margin-top:2rem;font-size:.7rem;color:rgba(255,255,255,.2);line-height:1.6}
</style>
</head>
<body>

<div class="bg-logo">
  <img src="https://temporal.pssantafe.org/wp-content/themes/theme-template-websimple/public/images/logo-header.svg"
       alt="" aria-hidden="true"
       onerror="this.style.display='none'">
</div>

<div class="login-box">
  <img src="https://temporal.pssantafe.org/wp-content/themes/theme-template-websimple/public/images/logo-header.svg"
       alt="PS Santa Fe" class="login-logo"
       onerror="this.style.display='none';document.querySelector('.login-logo-fallback').style.display='flex'">
  <div class="login-logo-fallback" style="display:none">PS</div>

  <h1>Foro Autoridades Locales</h1>
  <p class="subtitulo">Partido Socialista · Provincia de Santa Fe</p>

  <form onsubmit="acceder(event)">
    <div class="campo">
      <label>Usuario</label>
      <input type="text" id="usuario" placeholder="tu.nombre" autocomplete="username" autocapitalize="none">
    </div>
    <div class="campo">
      <label>Contraseña</label>
      <input type="password" id="clave" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Ingresar al foro →</button>
    <div class="error" id="error">Usuario o contraseña incorrectos. Verificá tus datos o contactá al administrador.</div>
  </form>

  <p class="footer-text">¿No tenés acceso? Escribinos a<br>autoridadeslocales@gmail.com</p>
</div>

<script>

function acceder(e) {
  e.preventDefault();
  const u = document.getElementById('usuario').value.trim().toLowerCase();
  const c = document.getElementById('clave').value;
  const err = document.getElementById('error');

  if (USUARIOS[u] && USUARIOS[u] === c) {
    localStorage.setItem('ps_foro_auth', btoa(u + ':' + Date.now()));
    localStorage.setItem('ps_foro_user', u);
    window.location.href = 'index.html';
  } else {
    err.classList.add('visible');
    document.getElementById('clave').value = '';
    document.getElementById('clave').focus();
  }
}

/* Si ya está logueado, ir directo */
if (localStorage.getItem('ps_foro_auth')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
