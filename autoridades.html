  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0D0509;
      --rojo:     #C41230;
      --rojo-osc: #8a0c20;
      --texto:    #ffffff;
      --texto-sec:#c0a0b0;
      --card-bg:  #1a0a10;
      --card-brd: #2a1020;
    }
    body {
      background: var(--bg);
      color: var(--texto);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      border-top: 4px solid var(--rojo);
      background: rgba(13,5,9,0.96);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--card-brd);
    }
    .nav-inner {
      max-width: 1260px; margin: 0 auto; padding: 0 1.5rem;
      height: 58px; display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
    }
    .nav-left { display: flex; align-items: center; gap: 0.875rem; }
    .btn-volver {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.82rem; font-weight: 600; color: var(--texto-sec);
      background: none; border: 1px solid var(--card-brd);
      border-radius: 6px; padding: 0.35rem 0.75rem;
      text-decoration: none; transition: color 0.2s, border-color 0.2s;
    }
    .btn-volver:hover { color: var(--texto); border-color: rgba(196,18,48,0.4); }
    .nav-rose { width: 26px; height: auto; flex-shrink: 0; }
    .nav-brand {
      font-size: 0.85rem; font-weight: 600; color: var(--texto);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      background: linear-gradient(180deg, rgba(196,18,48,0.07) 0%, transparent 100%);
      border-bottom: 1px solid var(--card-brd);
      padding: 2.25rem 1.5rem 1.75rem;
      text-align: center;
    }
    .page-eyebrow {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--rojo);
      margin-bottom: 0.55rem;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 3vw, 2.25rem);
      font-weight: 700; margin-bottom: 0.45rem;
    }
    .page-header p {
      font-size: 0.875rem; color: var(--texto-sec); max-width: 540px; margin: 0 auto;
    }

    /* ── LAYOUT ── */
    .container { max-width: 1260px; margin: 0 auto; padding: 0 1.5rem; }

    .aut-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 2rem;
      padding: 2rem 0 3rem;
      align-items: start;
    }

    /* ── MAP COLUMN ── */
    .mapa-col { position: sticky; top: 70px; }
    .mapa-wrap {
      background: var(--card-bg);
      border: 1px solid var(--card-brd);
      border-radius: 12px;
      padding: 1rem 0.875rem;
    }
    #mapaSvg { width: 100%; height: auto; display: block; }

    /* SVG dot interaction */
    .map-dot { cursor: pointer; }
    .map-dot .dot-halo { opacity: 0; transition: opacity 0.15s; }
    .map-dot:hover .dot-halo,
    .map-dot.active .dot-halo { opacity: 1; }
    .map-dot.active .dot-core { filter: brightness(1.4); }
    .map-dot.dimmed .dot-core { opacity: 0.18; }
    .map-dot.dimmed .dot-halo { opacity: 0 !important; }

    .mapa-leyenda {
      margin-top: 0.875rem;
      border-top: 1px solid var(--card-brd);
      padding-top: 0.875rem;
      display: flex; flex-direction: column; gap: 0.45rem;
    }
    .leg-item {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.72rem; color: var(--texto-sec);
    }
    .leg-int  { width: 14px; height: 14px; border-radius: 50%; background: var(--rojo); flex-shrink: 0; border: 2px solid rgba(196,18,48,0.35); outline: 3px solid rgba(196,18,48,0.15); }
    .leg-conc { width: 10px; height: 10px; border-radius: 50%; background: rgba(196,18,48,0.65); flex-shrink: 0; }
    .leg-com  { width: 8px; height: 8px; border-radius: 50%; background: #c9870e; flex-shrink: 0; }

    /* ── LIST COLUMN ── */
    .lista-col {}

    .buscar-wrap { position: relative; margin-bottom: 1.5rem; }
    .buscar-icon { position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%); font-size: 0.88rem; pointer-events: none; }
    .buscar-input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-brd);
      border-radius: 10px;
      color: var(--texto);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      padding: 0.72rem 1rem 0.72rem 2.4rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .buscar-input:focus { border-color: var(--rojo); }
    .buscar-input::placeholder { color: var(--texto-sec); opacity: 0.7; }

    /* Department blocks */
    .dept-block { margin-bottom: 2rem; }
    .dept-title {
      font-size: 0.66rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--rojo);
      margin-bottom: 0.8rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid rgba(196,18,48,0.2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .dept-count { color: var(--texto-sec); font-size: 0.6rem; font-weight: 500; text-transform: none; letter-spacing: 0; }

    .locs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
      gap: 0.6rem;
    }

    .loc-block {
      background: var(--card-bg);
      border: 1px solid var(--card-brd);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      cursor: pointer;
    }
    .loc-block:hover { border-color: rgba(196,18,48,0.35); background: rgba(196,18,48,0.04); }
    .loc-block.highlighted {
      border-color: var(--rojo);
      background: rgba(196,18,48,0.08);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(196,18,48,0.15);
    }
    .loc-nombre {
      font-size: 0.88rem; font-weight: 700; color: var(--texto);
      margin-bottom: 0.5rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .persona {
      display: flex; align-items: flex-start; gap: 0.4rem;
      margin-top: 0.35rem; flex-wrap: wrap;
    }
    .bdg {
      font-size: 0.57rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; padding: 0.1rem 0.4rem; border-radius: 4px;
      flex-shrink: 0; white-space: nowrap; margin-top: 1px;
    }
    .bdg-int  { background: rgba(196,18,48,0.22); color: #ff8a9a; border: 1px solid rgba(196,18,48,0.35); }
    .bdg-conc { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
    .bdg-com  { background: rgba(201,135,14,0.15); color: #fcd34d; border: 1px solid rgba(201,135,14,0.25); }

    .persona-info { display: flex; flex-direction: column; gap: 0.15rem; flex: 1; min-width: 0; }
    .persona-nombre { font-size: 0.8rem; color: var(--texto); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tel-link {
      font-size: 0.7rem; color: rgba(192,160,176,0.55); text-decoration: none;
      white-space: nowrap; transition: color 0.2s;
      display: inline-flex; align-items: center; gap: 0.2rem;
    }
    .tel-link:hover { color: var(--rojo); }

    .no-res { display: none; color: var(--texto-sec); font-size: 0.9rem; padding: 3rem 0; text-align: center; }

    /* ── RESPONSIVE ── */
    @media (max-width: 920px) {
      .aut-layout { grid-template-columns: 1fr; }
      .mapa-col { position: static; }
      .mapa-wrap { max-width: 240px; margin: 0 auto 0.5rem; }
    }
    @media (max-width: 540px) {
      .locs-grid { grid-template-columns: 1fr; }
      .page-header { padding: 1.75rem 1rem 1.25rem; }
    }
  </style>
</head>

  <!-- ── Session guard ── -->
  <script>
    (function() {
      var s = localStorage.getItem('concejalesps_sesion');
      var t = parseInt(localStorage.getItem('concejalesps_login_time') || '0', 10);
      if (s !== 'ok' || (t && Date.now() - t > 8 * 3600000)) {
        ['concejalesps_sesion','concejalesps_usuario','concejalesps_login_time'].forEach(function(k){ localStorage.removeItem(k); });
        window.location.href = 'login.html';
      }
    })();
  </script>

      'San Martín de las Escobas':  [38,  369],
      'Gálvez':                     [97,  370],
      'El Trébol':                  [60,  386],
      'Barrancas':                  [88,  384],
      'Villa Eloisa':               [72,  410],
      'Correa':                     [91,  418],
      'Rosario':                    [140, 454],
      'San José de la Esquina':     [65,  467],
      'Alvear':                     [185, 466],
      'Villa Gobernador Gálvez':    [127, 473],
      'Pueblo Esther':              [152, 481],
      'Villa Constitución':         [165, 482],
      'Acebal':                     [116, 493],
      'Villa Amelia':               [143, 490],
      'Bigand':                     [82,  484],
      'Cañada Rica':                [176, 494],
      'J.B. Molina':                [159, 499],
      'Sargento Cabral':            [172, 506],
      'Coronel Dominguez':          [135, 503],
      'Firmat':                     [77,  503],
      'Aarón Castellanos':          [49,  510],
      'Christophersen':             [62,  518],
      'San Francisco de Sta. Fe':   [71,  527],
      'Venado Tuerto':              [41,  529],
      'Diego de Alvear':            [51,  543],
    };

    // ── DERIVED DATA ─────────────────────────────────────────────────────────
    // Build per-localidad summary
    var locData = {};
    AUTORIDADES.forEach(function(a) {
      if (!locData[a.l]) locData[a.l] = { dept: a.d, hasInt: false, hasConc: false, hasCom: false, personas: [] };
      if (a.c === 'Intendente')   locData[a.l].hasInt  = true;
      if (a.c === 'Concejal')     locData[a.l].hasConc = true;
      if (a.c === 'Pte. Comunal') locData[a.l].hasCom  = true;
      locData[a.l].personas.push(a);
    });

    // ── MAP ───────────────────────────────────────────────────────────────────
    function renderMapa() {
      var g = document.getElementById('mapaDots');
      var html = '';
      Object.keys(locData).forEach(function(loc) {
        var coords = COORDS[loc];
        if (!coords) return;
        var cx = coords[0], cy = coords[1];
        var info = locData[loc];
        var tipo = info.hasInt ? 'int' : (info.hasConc ? 'conc' : 'com');
        var dotId = 'dot-' + loc.replace(/[^a-zA-Z0-9]/g, '_');

        if (tipo === 'int') {
          html += '<g class="map-dot" id="' + dotId + '" data-loc="' + escHtml(loc) + '" onclick="hilite(\'' + escJs(loc) + '\')">'
            + '<circle class="dot-halo" cx="' + cx + '" cy="' + cy + '" r="14" fill="#C41230" fill-opacity="0.22"/>'
            + '<circle class="dot-core" cx="' + cx + '" cy="' + cy + '" r="8" fill="#C41230"/>'
            + '<title>' + escHtml(loc) + ' · Intendente PS</title></g>';
        } else if (tipo === 'conc') {
          html += '<g class="map-dot" id="' + dotId + '" data-loc="' + escHtml(loc) + '" onclick="hilite(\'' + escJs(loc) + '\')">'
            + '<circle class="dot-halo" cx="' + cx + '" cy="' + cy + '" r="10" fill="#C41230" fill-opacity="0.22"/>'
            + '<circle class="dot-core" cx="' + cx + '" cy="' + cy + '" r="5.5" fill="#C41230" fill-opacity="0.7"/>'
            + '<title>' + escHtml(loc) + ' · Concejal PS</title></g>';
        } else {
          html += '<g class="map-dot" id="' + dotId + '" data-loc="' + escHtml(loc) + '" onclick="hilite(\'' + escJs(loc) + '\')">'
            + '<circle class="dot-halo" cx="' + cx + '" cy="' + cy + '" r="8" fill="#c9870e" fill-opacity="0.25"/>'
            + '<circle class="dot-core" cx="' + cx + '" cy="' + cy + '" r="4" fill="#c9870e" fill-opacity="0.88"/>'
            + '<title>' + escHtml(loc) + ' · Pte. Comunal PS</title></g>';
        }
      });
      g.innerHTML = html;
    }

    // ── LIST ─────────────────────────────────────────────────────────────────
    function badge(c) {
      if (c === 'Intendente')   return '<span class="bdg bdg-int">Intendente</span>';
      if (c === 'Concejal')     return '<span class="bdg bdg-conc">Concejal</span>';
      return '<span class="bdg bdg-com">Pte. Comunal</span>';
    }

    function telLink(t) {
      if (!t) return '';
      var num = '549' + t.replace(/\s|-/g, '');
      return '<a href="https://wa.me/' + num + '" class="tel-link" target="_blank" rel="noopener">📞 ' + t + '</a>';
    }

    function renderLista(q) {
      q = (q || '').toLowerCase().trim();
      var container = document.getElementById('listaDeptos');
      var noRes = document.getElementById('noRes');

      // Filter
      var lista = q ? AUTORIDADES.filter(function(a) {
        return (a.n + ' ' + a.l + ' ' + a.d).toLowerCase().indexOf(q) !== -1;
      }) : AUTORIDADES;

      if (!lista.length) {
        container.innerHTML = '';
        noRes.style.display = 'block';
        dimAllDots(q);
        return;
      }
      noRes.style.display = 'none';

      // Group by dept → loc
      var deptos = {};
      lista.forEach(function(a) {
        if (!deptos[a.d]) deptos[a.d] = {};
        if (!deptos[a.d][a.l]) deptos[a.d][a.l] = [];
        deptos[a.d][a.l].push(a);
      });

      var html = '';
      Object.keys(deptos).sort().forEach(function(dept) {
        var locs = deptos[dept];
        var nPers = lista.filter(function(a){ return a.d === dept; }).length;
        html += '<div class="dept-block">';
        html += '<div class="dept-title">Dpto. ' + escHtml(dept) + ' <span class="dept-count">' + nPers + ' autoridad' + (nPers !== 1 ? 'es' : '') + '</span></div>';
        html += '<div class="locs-grid">';
        Object.keys(locs).sort().forEach(function(loc) {
          var pers = locs[loc].slice().sort(function(a,b){
            var o = {Intendente:0, Concejal:1, 'Pte. Comunal':2};
            return (o[a.c]||3) - (o[b.c]||3);
          });
          var lid = 'loc-' + loc.replace(/[^a-zA-Z0-9]/g, '_');
          html += '<div class="loc-block" id="' + lid + '" data-loc="' + escHtml(loc) + '" onclick="hilite(\'' + escJs(loc) + '\')">';
          html += '<div class="loc-nombre">' + escHtml(loc) + '</div>';
          pers.forEach(function(p) {
            html += '<div class="persona">' + badge(p.c);
            html += '<div class="persona-info"><span class="persona-nombre">' + escHtml(p.n) + '</span>';
            if (p.t) html += telLink(p.t);
            html += '</div></div>';
          });
          html += '</div>';
        });
        html += '</div></div>';
      });

      container.innerHTML = html;
      dimAllDots(q);
    }

    // ── INTERACTIONS ─────────────────────────────────────────────────────────
    var activeLocEl = null;
    var activeDotEl = null;

    function hilite(loc) {
      // Clear previous
      if (activeLocEl) activeLocEl.classList.remove('highlighted');
      if (activeDotEl) activeDotEl.classList.remove('active');

      // Highlight loc block
      var lid = 'loc-' + loc.replace(/[^a-zA-Z0-9]/g, '_');
      var el = document.getElementById(lid);
      if (el) {
        el.classList.add('highlighted');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        activeLocEl = el;
      }

      // Highlight map dot
      var dotId = 'dot-' + loc.replace(/[^a-zA-Z0-9]/g, '_');
      var dot = document.getElementById(dotId);
      if (dot) {
        dot.classList.add('active');
        activeDotEl = dot;
      }
    }

    function dimAllDots(q) {
      var allDots = document.querySelectorAll('.map-dot');
      if (!q) {
        allDots.forEach(function(d){ d.classList.remove('dimmed'); });
        return;
      }
      // Which locs match the query?
      var matchLocs = {};
      AUTORIDADES.filter(function(a){
        return (a.n + ' ' + a.l + ' ' + a.d).toLowerCase().indexOf(q) !== -1;
      }).forEach(function(a){ matchLocs[a.l] = true; });

      allDots.forEach(function(d) {
        var loc = d.getAttribute('data-loc');
        if (matchLocs[loc]) d.classList.remove('dimmed');
        else d.classList.add('dimmed');
      });
    }

    function filtrar(q) {
      renderLista(q);
    }

    // ── UTILS ─────────────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escJs(s) {
      return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    }

    // ── INIT ─────────────────────────────────────────────────────────────────
    renderMapa();
    renderLista('');
  </script>
</body>
</html>
